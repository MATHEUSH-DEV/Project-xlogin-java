# Kronus Rift Login System - Application Configuration
# Date: 2026-03-23
# Principles: Constitution Principle II (Security-First), Principle I (Multi-layer config precedence)
#
# Configuration Precedence (per research.md):
# 1. Environment variables (highest priority)
# 2. application.properties (this file)
# 3. Code defaults (lowest priority)
#
# Override any setting with environment variable, e.g.:
#   BCRYPT_COST=13
#   DATABASE_PATH=/custom/path/db.sqlite
#   JWT_SIGNING_KEY=your-secret-key-here

# ============================================================================
# DATABASE CONFIGURATION
# ============================================================================
database.path=./kronus_local.db
database.driver=org.sqlite.JDBC
database.pool.size=10
database.pool.timeout.seconds=30
database.pool.leak.detection.threshold=15000

# ============================================================================
# AUTHENTICATION & SECURITY (Constitution Principle II - Non-Negotiable)
# ============================================================================

# BCrypt password hashing cost factor (10-31, higher = more secure but slower)
# Must be ≥12 per Constitution Principle II
# Cost 12 ≈ 80-100ms per hash (acceptable for user login)
# Cost 13 ≈ 200ms per hash (slower but more secure)
bcrypt.cost=12

# JWT Session Token Configuration
jwt.signing.key=dev-change-me-in-production-use-min-32-chars-alphanumeric
jwt.algorithm=HS256
jwt.issuer=kronus-rift
jwt.subject.claim=sub
jwt.token.ttl.minutes=60

# Rate Limiting (Constitution Principle II - security-first)
# Limit: 5 failed attempts per IP
# Window: 15 minutes
# After threshold: return 429 Too Many Requests
rate.limit.attempts=5
rate.limit.window.minutes=15

# ============================================================================
# LOGGING CONFIGURATION (Constitution Principle V - Clarity & Documentation)
# ============================================================================
# Logging levels: TRACE, DEBUG, INFO, WARN, ERROR, OFF
# Default levels (can be overridden by logback.xml)

# Kronus application logging
logging.level.com.kronus=INFO
logging.level.com.kronus.service=INFO
logging.level.com.kronus.util=INFO
logging.level.com.kronus.dao=INFO

# Third-party libraries
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.java.sql.PreparedStatement=WARN

# Audit trail logging (separate from application logs)
audit.logging.enabled=true
audit.logging.file=./logs/audit-trail.log
audit.logging.retention.days=90

# ============================================================================
# SESSION MANAGEMENT
# ============================================================================
session.timeout.minutes=60
session.cleanup.interval.hours=1
session.max.concurrent.per.user=1

# ============================================================================
# UI & DISPLAY SETTINGS
# ============================================================================
ui.theme=dark
ui.window.title=Xlogin - Kronus Rift
ui.api.base.url=http://localhost:8080/api

# ============================================================================
# DEVELOPMENT & DEBUG SETTINGS (dev-only, disabled in production)
# ============================================================================
# Set to true to enable console debug output
debug.enabled=false
debug.log.sql=false
debug.log.tokens=false

# ============================================================================
# FEATURE FLAGS (for gradual rollout)
# ============================================================================
feature.registration.enabled=true
feature.password.reset.enabled=false
feature.two.factor.auth.enabled=false
feature.oauth.enabled=false

# ============================================================================
# PERFORMANCE & TUNING
# ============================================================================
# HTTP client timeout for external API calls (milliseconds)
http.client.timeout.ms=5000

# Database connection timeout (milliseconds)
database.connection.timeout.ms=10000

# Cache settings
cache.enabled=true
cache.ttl.minutes=30

# ============================================================================
# EXTERNAL INTEGRATIONS (deferred for Phase 2+)
# ============================================================================
# Email service for password reset (future)
email.service.enabled=false
email.service.provider=smtp

# Monitoring & observability (future)
monitoring.enabled=false
monitoring.metrics.export=false
